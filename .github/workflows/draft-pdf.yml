name: Build JOSS paper draft
on:
  push:
    paths:
      - paper/**
      - .github/workflows/draft-pdf.yml


jobs:
  paper:
    runs-on: ubuntu-latest
    name: Paper Draft
    steps:
      - name: Checkout
        uses: actions/checkout
      - name: TeX and PDF
        uses: docker://openjournals/paperdraft:latest
        with:
          args: '-k paper/paper.md'
        env:
          GIT_SHA: $GITHUB_SHA
          JOURNAL: joss
      - name: Upload
        uses: actions/upload-artifact
        with:
          name: paper
          path: paper/

# see here! https://github.com/openjournals/joss/issues/132#issuecomment-890440692